<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake | AI Edition</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --snake-color: #00ff88;
            --food-color: #ff4444;
            --warriors-gold: #FFC72C;
            --warriors-blue: #1D428A;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .nav-back {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: var(--warriors-gold);
            font-weight: bold;
            border: 1px solid var(--warriors-gold);
            padding: 8px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .nav-back:hover {
            background: var(--warriors-gold);
            color: var(--warriors-blue);
        }

        canvas {
            background-color: #000;
            border: 4px solid #30363d;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.1);
        }

        .score-board {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--snake-color);
        }

        #game-over {
            position: absolute;
            background: rgba(13, 17, 23, 0.9);
            padding: 30px;
            border: 2px solid var(--food-color);
            border-radius: 15px;
            text-align: center;
            display: none;
        }

        button {
            background: var(--snake-color);
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <a href="curry.html" class="nav-back">← Back to Curry Page</a>

    <div class="score-board">Score: <span id="score">0</span> | High Score: <span id="high-score">0</span></div>

    <div style="position: relative;">
        <canvas id="snakeGame" width="400" height="400"></canvas>
        <div id="game-over">
            <h2 style="color: var(--food-color)">GAME OVER</h2>
            <p id="final-stats"></p>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const highScoreEl = document.getElementById("high-score");
        const gameOverEl = document.getElementById("game-over");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        highScoreEl.textContent = highScore;

        let dx = 0, dy = 0;
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let gameSpeed = 100;
        let nextDx = 0, nextDy = 0; // Buffer for input

        function main() {
            if (didGameEnd()) {
                showGameOver();
                return;
            }

            dx = nextDx;
            dy = nextDy;

            clearCanvas();
            drawFood();
            advanceSnake();
            drawSnake();
            
            setTimeout(main, gameSpeed);
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "#00ff88" : "#00cc6a";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function advanceSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                if (score % 50 === 0) gameSpeed = Math.max(50, gameSpeed - 5);
                createFood();
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            if (dx === 0 && dy === 0) return false;
            
            // Wall collisions
            const hitWall = snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount;
            
            // Self collision
            let hitSelf = false;
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) hitSelf = true;
            }

            return hitWall || hitSelf;
        }

        function createFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            snake.forEach(part => { if (part.x === food.x && part.y === food.y) createFood(); });
        }

        function drawFood() {
            ctx.fillStyle = "#ff4444";
            ctx.beginPath();
            ctx.arc(food.x * gridSize + 10, food.y * gridSize + 10, 8, 0, Math.PI * 2);
            ctx.fill();
        }

        function showGameOver() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("snakeHighScore", highScore);
                highScoreEl.textContent = highScore;
            }
            document.getElementById("final-stats").textContent = `Score: ${score}`;
            gameOverEl.style.display = "block";
        }

        function resetGame() {
            score = 0; scoreEl.textContent = "0";
            dx = 0; dy = 0; nextDx = 0; nextDy = 0;
            snake = [{ x: 10, y: 10 }];
            gameSpeed = 100;
            gameOverEl.style.display = "none";
            createFood();
            main();
        }

        window.addEventListener("keydown", e => {
            const key = e.key.toLowerCase();
            // Block 180-degree turns
            if ((key === "arrowup" || key === "w") && dy !== 1) { nextDx = 0; nextDy = -1; }
            if ((key === "arrowdown" || key === "s") && dy !== -1) { nextDx = 0; nextDy = 1; }
            if ((key === "arrowleft" || key === "a") && dx !== 1) { nextDx = -1; nextDy = 0; }
            if ((key === "arrowright" || key === "d") && dx !== -1) { nextDx = 1; nextDy = 0; }
        });

        createFood();
        main();
    </script>
</body>
</html>
